<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feri — Health Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:       #0c0c0b;
  --s1:       #1a1a18;
  --s2:       #272724;
  --s3:       #313130;
  --border:   rgba(255,255,255,0.1);
  --border2:  rgba(255,255,255,0.2);
  --text:     #f5f2ea;
  --text2:    #b8b4ac;
  --text3:    #7a7874;
  --teal:     #34c99a;
  --teal-d:   rgba(52,201,154,0.1);
  --amber:    #e8993a;
  --amber-d:  rgba(232,153,58,0.1);
  --red:      #e05252;
  --red-d:    rgba(224,82,82,0.08);
  --blue:     #5b9cf6;
  --blue-d:   rgba(91,156,246,0.1);
  --r:        14px;
  --rs:       9px;
  --f:        'Plus Jakarta Sans', sans-serif;
  --m:        'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--f);font-size:15px;line-height:1.6;min-height:100vh}

/* ── SETUP ── */
#setup{display:none;min-height:100vh;align-items:center;justify-content:center;padding:2rem}
.sc{background:var(--s1);border:.5px solid var(--border2);border-radius:var(--r);padding:2.5rem;max-width:420px;width:100%}
.sc h2{font-size:20px;font-weight:600;margin-bottom:4px}
.sc h2 span{color:var(--teal)}
.sc p{font-size:13px;color:var(--text2);margin-bottom:2rem;line-height:1.6;font-family:var(--m)}
.sc label{font-family:var(--m);font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px}
.sc input{width:100%;background:var(--s2);border:.5px solid var(--border2);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-family:var(--m);font-size:13px;outline:none;margin-bottom:1rem}
.sc input:focus{border-color:var(--teal)}
.sc button{width:100%;padding:11px;background:var(--teal);border:none;border-radius:var(--rs);color:#0c0c0b;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer}

/* ── APP SHELL ── */
#app{display:none;max-width:960px;margin:0 auto;padding:0 1.25rem 5rem}

/* ── TOP NAV ── */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 0}
.logo{font-size:15px;font-weight:600;letter-spacing:-.2px}
.logo span{color:var(--teal)}
.nav-right{display:flex;align-items:center;gap:8px}
.sync-info{font-family:var(--m);font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 2.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn-sm{display:flex;align-items:center;gap:5px;padding:5px 12px;background:transparent;border:.5px solid var(--border2);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--m);transition:all .15s}
.btn-sm:hover{background:var(--s2);color:var(--text);border-color:var(--border2)}
.btn-sm:disabled{opacity:.4;cursor:not-allowed}
.spin{width:10px;height:10px;border:1.5px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs{display:flex;gap:2px;padding:.75rem 0;border-bottom:.5px solid var(--border);margin-bottom:2rem}
.tab{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;background:transparent;border:none;transition:all .15s;font-family:var(--f)}
.tab:hover{color:var(--text)}
.tab.active{background:var(--s2);color:var(--text);border:.5px solid var(--border2)}

/* ── HERO ── */
.hero{padding:2rem 0 1.75rem;border-bottom:.5px solid var(--border);margin-bottom:1.75rem}
.hero-score-row{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:.75rem}
.hero-score{font-size:72px;font-weight:300;line-height:1;letter-spacing:-3px}
.hero-label{font-size:22px;font-weight:600;margin-bottom:4px}
.hero-coaching{font-size:15px;color:var(--text2);max-width:520px;line-height:1.6;font-weight:300;font-style:italic}
.hero-ring{flex-shrink:0;position:relative;width:88px;height:88px}

/* ── PILLAR GRID ── */
.pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
@media(max-width:600px){.pillars{grid-template-columns:1fr 1fr}}
.pillar{background:var(--s1);border:.5px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:border-color .15s}
.pillar:hover{border-color:var(--border2)}
.pillar-label{font-family:var(--m);font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.75rem}
.pillar-value{font-size:28px;font-weight:300;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.pillar-sub{font-size:12px;color:var(--text2);margin-bottom:.75rem}
.pillar-coaching{font-size:12px;color:var(--text);opacity:0.75;font-style:italic;line-height:1.5;padding-top:.75rem;border-top:.5px solid var(--border)}

/* ── SECTION ── */
.sec{margin-bottom:2rem}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.sec-title{font-family:var(--m);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.sec-line{flex:1;height:.5px;background:var(--border)}

/* ── CARD ── */
.card{background:var(--s1);border:.5px solid var(--border);border-radius:var(--r);padding:1.25rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:560px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}

/* ── MINI METRIC ── */
.mm{background:var(--s2);border-radius:var(--rs);padding:1rem 1.1rem}
.mm-l{font-family:var(--m);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.mm-v{font-size:22px;font-weight:300;letter-spacing:-.5px;line-height:1;margin-bottom:3px}
.mm-s{font-size:11px;color:var(--text3)}
.tag{display:inline-block;font-family:var(--m);font-size:10px;padding:2px 8px;border-radius:20px;margin-top:5px}
.tt{background:var(--teal-d);color:var(--teal)}
.ta{background:var(--amber-d);color:var(--amber)}
.tr{background:var(--red-d);color:var(--red)}
.tb{background:var(--blue-d);color:var(--blue)}

/* ── STREAK ── */
.streak{background:var(--s1);border:.5px solid var(--border);border-radius:var(--r);padding:1.25rem}
.streak-n{font-size:44px;font-weight:300;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.streak-l{font-size:13px;color:var(--text2);margin-bottom:.75rem}
.dots{display:flex;gap:4px;margin-bottom:.5rem}
.dot{width:7px;height:7px;border-radius:50%}
.don{background:var(--teal)}
.dof{background:var(--s3)}
.streak-note{font-family:var(--m);font-size:10px;color:var(--text3)}

/* ── FACTOR ROW ── */
.frow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--border);font-size:13px}
.frow:last-child{border-bottom:none}
.fl{color:var(--text2)}
.fv{font-family:var(--m);font-size:12px}
.fbar{margin-top:3px;height:2px;border-radius:1px}

/* ── WQ ROW ── */
.wqr{display:grid;grid-template-columns:52px 1fr 48px;gap:10px;align-items:center;padding:10px 0;border-bottom:.5px solid var(--border)}
.wqr:last-child{border-bottom:none}
.wqd{font-family:var(--m);font-size:10px;color:var(--text3);line-height:1.5}
.wqn{font-size:13px;font-weight:500;margin-bottom:2px}
.wqdet{font-family:var(--m);font-size:10px;color:var(--text2)}
.wqnote{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic}
.hbar{display:flex;align-items:center;gap:5px;margin-top:3px;font-family:var(--m);font-size:9px;color:var(--text3)}
.hbg{flex:1;height:2px;background:var(--s3);border-radius:1px;overflow:hidden}
.hbf{height:100%;border-radius:1px}
.wqs{text-align:center}
.wqsn{font-size:26px;font-weight:300;letter-spacing:-1px;line-height:1}
.wqsl{font-family:var(--m);font-size:9px;color:var(--text3)}

/* ── REC ── */
.rec{display:flex;gap:10px;padding:12px 0;border-bottom:.5px solid var(--border)}
.rec:last-child{border-bottom:none}
.recdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:8px}
.rect{font-size:13px;font-weight:500;margin-bottom:2px}
.recb{font-size:12px;color:var(--text2);line-height:1.5}

/* ── READINESS WEEK ── */
.rw{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.rwc{text-align:center;background:var(--s2);border-radius:var(--rs);padding:10px 4px}
.rws{font-size:20px;font-weight:300;letter-spacing:-1px}
.rwd{font-family:var(--m);font-size:9px;color:var(--text3);margin-top:3px;line-height:1.4}

/* ── AGE BAR ── */
.agebar{position:relative;height:5px;background:var(--s3);border-radius:3px;overflow:visible;margin:1rem 0 1.5rem}
.agebar-fill{position:absolute;inset:0;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--amber),var(--red))}
.agemark{position:absolute;border-radius:1px}

/* ── MUSCLE GRID ── */
.mtile{background:var(--s2);border-radius:var(--rs);padding:10px}
.mname{font-family:var(--m);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.mbar{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;margin-bottom:4px}
.mbarf{height:100%;border-radius:1px}
.mstat{font-size:10px;color:var(--text3)}

/* ── CHART WRAPPER ── */
.cw{position:relative;width:100%}

/* ── DIVIDER ── */
hr{border:none;border-top:.5px solid var(--border);margin:1.25rem 0}

.err{background:var(--red-d);border:.5px solid var(--red);border-radius:var(--r);padding:.875rem 1.25rem;font-family:var(--m);font-size:12px;color:var(--red);margin-bottom:1.5rem;line-height:1.7}
.upd{font-family:var(--m);font-size:10px;color:var(--text3);text-align:center;padding-top:2rem;border-top:.5px solid var(--border)}
.pf-hero{background:var(--s1);border:.5px solid var(--border2);border-radius:var(--r);padding:1.5rem;margin-bottom:10px}
.pf-hero-top{display:flex;align-items:flex-end;gap:1rem;margin-bottom:1rem;border-bottom:.5px solid var(--border);padding-bottom:1rem}
.pf-hero-num{font-size:64px;font-weight:300;letter-spacing:-3px;line-height:1;flex-shrink:0}
.pf-hero-meta{}
.pf-hero-name{font-size:18px;font-weight:500;color:var(--text);margin-bottom:2px}
.pf-hero-ins{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:10px;letter-spacing:.04em}
.pf-hero-why{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.pf-notes{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pf-note{font-size:11px;padding:3px 10px;border-radius:20px;border:.5px solid var(--border2);color:var(--text2);font-family:var(--mono)}
.pf-how{font-size:11px;color:var(--text3);font-family:var(--mono);padding-top:12px;border-top:.5px solid var(--border)}
.pf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.wq-row{display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:center;padding:.7rem 1.1rem;border-bottom:.5px solid var(--border)}
.wq-row:last-child{border-bottom:none}
.wq-meta{display:none}
.wq-date{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap;padding-top:2px}
.wq-type{font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);margin-top:2px}
.wq-body{min-width:0}
.wq-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.wq-stats{font-size:11px;color:var(--text3);margin-bottom:2px}
.wq-score{font-size:24px;font-weight:400;letter-spacing:-.5px;text-align:right;white-space:nowrap;line-height:1}
.ws-row{display:grid;grid-template-columns:56px 1fr;gap:12px;align-items:start;padding:.85rem 1.1rem;border-bottom:.5px solid var(--border)}
.ws-row:last-child{border-bottom:none}
.ws-left{text-align:right}
.ws-type{font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);margin-top:2px}
.ws-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.ex-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.ex-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--s3);color:var(--text2);font-family:var(--mono);white-space:nowrap}
.muscle-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px}
.muscle-item{background:var(--s2);border-radius:var(--rs);padding:.7rem .8rem}
.muscle-k{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:3px}
.mstat{font-size:11px;color:var(--text2)}
.pf-card{background:var(--s2);border-radius:var(--rs);padding:1rem 1.1rem;border:1.5px solid transparent;cursor:pointer;transition:border-color .15s}
.pf-card.pf-active{background:var(--s1);border-color:var(--border2)}
.pf-card-num{font-size:28px;font-weight:300;letter-spacing:-1.5px;line-height:1;margin-bottom:3px}
.pf-card-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.pf-card-mood{font-size:10px;color:var(--text3);margin-bottom:8px}
.pf-badges{display:flex;gap:5px;flex-wrap:wrap}
.pf-score{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--mono)}
.pf-pick{font-size:10px;padding:2px 8px;border-radius:20px;font-family:var(--mono);background:var(--teal-d);color:var(--teal)}
@media(max-width:560px){.pf-hero{flex-direction:column;gap:1rem}.pf-hero-num{font-size:52px}}

.matrix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:480px){.matrix-grid{grid-template-columns:repeat(2,1fr)}}
.gauge-card{background:var(--s2);border-radius:var(--rs);padding:.9rem 1rem;text-align:center}
.gauge-val{font-size:32px;font-weight:300;letter-spacing:-1.5px;line-height:1;margin-bottom:2px}
.gauge-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:var(--mono);margin-bottom:6px}
.gauge-bar{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:6px}
.gauge-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.gauge-desc{font-size:10px;color:var(--text3);font-family:var(--mono)}
.illness-factors{margin-top:8px}
.illness-factor{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:.5px solid var(--border);font-size:11px;color:var(--text2)}
.illness-factor:last-child{border-bottom:none}
.if-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.spotify-rides{margin-top:0}
.sr-card{background:var(--s2);border-radius:var(--rs);padding:1rem 1.1rem;margin-bottom:8px}
.sr-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sr-title{font-size:13px;font-weight:500;color:var(--text)}
.sr-time{font-size:10px;color:var(--text3);font-family:var(--mono)}
.sr-stats{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.sr-stat{text-align:center}
.sr-stat-v{font-size:16px;font-weight:300;color:var(--teal)}
.sr-stat-l{font-size:9px;color:var(--text3);font-family:var(--mono);text-transform:uppercase}
.sr-tracks{display:flex;flex-direction:column;gap:4px}
.sr-track{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:.5px solid var(--border);font-size:11px}
.sr-track:last-child{border-bottom:none}
.sr-track-name{color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-track-meta{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;margin-left:8px}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="sc">
    <h2>Health <span>Centre</span></h2>
    <p>Enter your GitHub read-only token to connect.<br>github.com/settings/tokens?type=beta → somogyif/health → Contents: Read-only</p>
    <label>GitHub token</label>
    <input id="ghToken" type="password" placeholder="github_pat_..." autocomplete="off">
    <button onclick="saveToken()">Connect →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topnav">
    <div class="logo">Health <span>Centre</span></div>
    <div class="nav-right">
      <div class="sync-info">
        <div class="live-dot"></div>
        <span id="sub">loading</span>
      </div>
      <button class="btn-sm" onclick="clearToken()" title="Reset token">⚙</button>
      <button class="btn-sm" id="rbtn" onclick="load()">
        <div class="spin" id="spin"></div>
        <span id="rl">↻ sync</span>
      </button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('today',this)">Today</button>
    <button class="tab" onclick="showTab('training',this)">Training</button>
    <button class="tab" onclick="showTab('trends',this)">Trends</button>
  </div>

  <div id="errbox" class="err" style="display:none"></div>

  <div id="tab-today"></div>
  <div id="tab-training" style="display:none"></div>
  <div id="tab-trends" style="display:none"></div>
</div>

<script>
const REPO='somogyif/health', FILE='data.json';
const getToken=()=>localStorage.getItem('gh_token')||'';
const saveToken=()=>{const t=document.getElementById('ghToken').value.trim();if(!t){alert('Enter your GitHub token');return;}localStorage.setItem('gh_token',t);boot();};
const clearToken=()=>{localStorage.removeItem('gh_token');location.reload();};

window.addEventListener('DOMContentLoaded',()=>{
  if(getToken()){document.getElementById('app').style.display='block';load();}
  else{document.getElementById('setup').style.display='flex';}
});

function boot(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  load();
}

function showTab(id,el){
  ['today','training','trends'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===id?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

async function fetchData(){
  const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
    headers:{'Authorization':'Bearer '+getToken(),'Accept':'application/vnd.github.raw+json'},
    signal:AbortSignal.timeout(10000)
  });
  if(!res.ok) throw new Error(`GitHub ${res.status}`);
  return res.json();
}

let CHS=[];
function killCharts(){CHS.forEach(c=>{try{c.destroy()}catch(e){}});CHS=[];}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;const c=new Chart(el,cfg);CHS.push(c);}
const gc='rgba(255,255,255,0.04)', tc='#3e3d3b';
const scol=s=>s>=85?'var(--teal)':s>=65?'var(--amber)':'var(--red)';
const fmt=(v,u='')=>v!=null?`${v}${u}`:'—';

// Coaching copy
function coachingVerdict(score,level){
  if(score>=90) return {label:'Prime condition',coaching:'All systems are go. Your body is fully charged — this is a great day to push hard.',color:'var(--teal)'};
  if(score>=75) return {label:'Well recovered',coaching:'Good recovery overnight. A solid training session is in order.',color:'var(--teal)'};
  if(score>=60) return {label:'Moderate readiness',coaching:'Train if you need to, but keep intensity moderate. Prioritise an early night.',color:'var(--amber)'};
  return {label:'Focus on energy',coaching:'Recovery is low today. Light movement, good food, and sleep will serve you better than a hard session.',color:'var(--red)'};
}

function sleepCoaching(h,score){
  if(!h) return 'No sleep data — make sure your watch is on tonight.';
  if(h>=8) return 'Excellent sleep. Your body had plenty of time to repair and consolidate.';
  if(h>=7.5) return 'Good sleep duration. You\'re giving your body what it needs.';
  if(h>=6.5) return 'Slightly short — aim for 7.5h+ tonight to clear your sleep debt.';
  return 'Sleep was below target. Prioritise an earlier bedtime tonight.';
}

function hrCoaching(rhr,avg){
  if(!rhr) return '—';
  const diff=rhr-(avg||rhr);
  if(diff<=-3) return 'Notably lower than your average — a great recovery signal.';
  if(diff<=1) return 'Tracking close to your normal baseline. Recovery is on track.';
  return 'Slightly elevated — expected after a hard effort or poor sleep.';
}

function trainingCoaching(acwr){
  if(acwr===undefined||acwr===null) return '—';
  if(acwr<0.05) return 'Training load is very low. Your body is ready for more stimulus.';
  if(acwr<0.15) return 'Acute load is below your chronic baseline — a good time to build.';
  if(acwr<0.3) return 'Load is in a productive range. Keep the current frequency.';
  return 'Load is high. Prioritise recovery before adding more volume.';
}

        <div style="display:flex;gap:14px;margin-top:10px;font-family:var(--m);font-size:10px;color:var(--text3)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:2px;background:var(--teal);display:inline-block"></span>wake-up battery</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:2px;background:var(--amber);display:inline-block"></span>points drained</span>
        </div>
        <div style="font-size:12px;color:var(--text2);font-style:italic;margin-top:1rem;line-height:1.5">${(d.body_battery_6wk||[]).length>=2 ? `Wake-up battery avg ${Math.round((d.body_battery_6wk||[]).slice(-7).reduce((a,b)=>a+(b.val||0),0)/Math.min(7,(d.body_battery_6wk||[]).length))} over the last 7 days. Keep consistent sleep timing to stabilise recovery.` : 'Keep wearing the watch to bed to build battery trend data.'}</div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-head"><div class="sec-title">📈 Stress vs recovery</div><div class="sec-line"></div></div>
      <div class="card">
        <div class="cw" style="height:160px"><canvas id="stressChart" role="img" aria-label="Stress vs body battery chart">Stress and recovery balance over the past week.</canvas></div>
        <div style="display:flex;gap:14px;margin-top:10px;font-family:var(--m);font-size:10px;color:var(--text3)">
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:2px;background:var(--red);display:inline-block"></span>avg stress</span>
          <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:2px;background:var(--teal);display:inline-block"></span>battery charged overnight</span>
        </div>
        <div style="font-size:12px;color:var(--text2);font-style:italic;margin-top:1rem;line-height:1.5">Sleep quality is the primary bottleneck for recovery. Keep stress low in the evenings and maintain a consistent bedtime.</div>
      </div>
    </div>

    <div class="upd">synced ${synced} · garmin fenix 7x · hevy pro · apple health</div>
  `;

  // ── CHARTS ─────────────────────────────────────────────────────────────
  mkChart('heroRing',{
    type:'doughnut',
    data:{datasets:[{data:[rs,100-rs],backgroundColor:[rs>=85?'#34c99a':rs>=65?'#e8993a':'#e05252','rgba(255,255,255,0.04)'],borderWidth:0,circumference:270,rotation:225}]},
    options:{responsive:false,cutout:'82%',plugins:{legend:{display:false},tooltip:{enabled:false}}},
    plugins:[{id:'ct',afterDraw(chart){
      const{ctx,chartArea:{left,top,width,height}}=chart;
      ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
      const cx=left+width/2,cy=top+height/2;
      ctx.font='300 26px Plus Jakarta Sans,sans-serif';
      ctx.fillStyle=rs>=85?'#34c99a':rs>=65?'#e8993a':'#e05252';
      ctx.fillText(rs,cx,cy-5);
      ctx.font='10px DM Mono,monospace';ctx.fillStyle='#3e3d3b';
      ctx.fillText('/100',cx,cy+11);ctx.restore();
    }}]
  });

  if(bc.weight&&bc.lean_kg){
    mkChart('compChart',{
      type:'bar',
      data:{labels:[''],datasets:[
        {label:'Lean',data:[bc.lean_kg],backgroundColor:'#34c99a',borderWidth:0,borderRadius:3,borderSkipped:false},
        {label:'Fat',data:[bc.weight-bc.lean_kg],backgroundColor:'#e8993a',borderWidth:0,borderRadius:3,borderSkipped:false}
      ]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,max:90,ticks:{callback:v=>v+' kg',color:tc,font:{size:9}},grid:{color:gc}},y:{stacked:true,display:false}}}
    });
  }

  if(ss.labels&&ss.labels.length){
    mkChart('sleepChart',{
      type:'bar',
      data:{labels:ss.labels,datasets:[{label:'😴 Sleep score',data:ss.scores,backgroundColor:ss.scores.map(s=>s>=80?'rgba(52,201,154,0.7)':s>=65?'rgba(232,153,58,0.7)':'rgba(224,82,82,0.7)'),borderRadius:4,borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tc,font:{size:9}},grid:{color:gc}},y:{min:0,max:100,ticks:{color:tc,font:{size:9}},grid:{color:gc}}}}
    });
  }

  if(bbt.labels&&bbt.labels.length){
    mkChart('bbChart',{
      type:'line',
      data:{labels:bbt.labels,datasets:[
        {label:'Wake-up battery',data:bbt.wake,borderColor:'#34c99a',backgroundColor:'rgba(52,201,154,0.04)',borderWidth:1.5,pointRadius:0,tension:0.4,fill:true},
        {label:'Points drained',data:bbt.drain,borderColor:'#e8993a',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.4,borderDash:[4,3]}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+Math.round(c.parsed.y)}}},scales:{x:{ticks:{color:tc,font:{size:9},maxRotation:45,autoSkip:true,maxTicksLimit:12},grid:{color:gc}},y:{min:0,max:105,ticks:{color:tc,font:{size:9}},grid:{color:gc}}}}
    });
  }

  if(sw.labels&&sw.labels.length){
    mkChart('stressChart',{
      type:'line',
      data:{labels:sw.labels,datasets:[
        {label:'Avg stress',data:sw.stress,borderColor:'rgba(224,82,82,0.8)',backgroundColor:'rgba(224,82,82,0.04)',borderWidth:1.5,pointRadius:3,pointBackgroundColor:'rgba(224,82,82,0.8)',tension:0.4,fill:true},
        {label:'BB charged',data:sw.bb_charged,borderColor:'rgba(52,201,154,0.8)',backgroundColor:'transparent',borderWidth:1.5,pointRadius:3,pointBackgroundColor:'rgba(52,201,154,0.8)',tension:0.4,borderDash:[4,3]}
      ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+(c.parsed.y??'—')}}},scales:{x:{ticks:{color:tc,font:{size:9},maxRotation:30},grid:{color:gc}},y:{min:0,max:100,ticks:{color:tc,font:{size:9}},grid:{color:gc}}}}
    });
  }
}

async function load(){
  const btn=document.getElementById('rbtn'),sp=document.getElementById('spin'),rl=document.getElementById('rl'),eb=document.getElementById('errbox');
  btn.disabled=true;sp.style.display='block';rl.textContent='syncing...';eb.style.display='none';
  document.getElementById('sub').textContent='syncing...';
  try{
    const data=await fetchData();
    render(data);
  }catch(e){
    eb.innerHTML=`<strong>Could not load data.json</strong> — ${e.message}`;
    eb.style.display='block';
    document.getElementById('sub').textContent='error';
  }
  btn.disabled=false;sp.style.display='none';rl.textContent='↻ sync';
}
</script>
</body>
</html>
