<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feri — Health Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0e0e0c; --surface:#161614; --surface2:#1e1e1b; --surface3:#262622;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0ede4; --text2:#9e9b92; --text3:#5a5852;
  --teal:#2dd4a0; --teal-dim:rgba(45,212,160,0.12);
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.12);
  --red:#ff5f5f; --red-dim:rgba(255,95,95,0.1);
  --blue:#5b9cf6; --blue-dim:rgba(91,156,246,0.1);
  --green:#6fcf97; --green-dim:rgba(111,207,151,0.1);
  --r:14px; --rs:8px;
  --body:'DM Sans',sans-serif; --serif:'Instrument Serif',serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.page{max-width:1000px;margin:0 auto;padding:2.5rem 1.5rem 5rem;position:relative;z-index:1}
.header{margin-bottom:2.5rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.title{font-family:var(--serif);font-size:32px;font-weight:400;font-style:italic;letter-spacing:-0.5px;line-height:1.1}
.title span{color:var(--teal)}
.sub{font-size:12px;color:var(--text3);margin-top:6px;font-family:var(--mono)}
.hbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.rbtn{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface2);border:.5px solid var(--border2);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--mono);transition:all .2s;white-space:nowrap}
.rbtn:hover{background:var(--surface3);color:var(--text)}
.rbtn:disabled{opacity:.5;cursor:not-allowed}
.spin{width:12px;height:12px;border:1.5px solid var(--border2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.sec{margin-bottom:2rem}
.lbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.lbl::after{content:'';flex:1;height:.5px;background:var(--border)}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:1.25rem;animation:up .4s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.g2{grid-template-columns:1fr}}
.mt{background:var(--surface2);border:.5px solid var(--border);border-radius:var(--rs);padding:14px 16px;transition:border-color .2s}
.mt:hover{border-color:var(--border2)}
.ml{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:6px}
.mv{font-size:26px;font-weight:300;line-height:1;letter-spacing:-1px}
.mv.tl{color:var(--teal)}.mv.am{color:var(--amber)}.mv.rd{color:var(--red)}
.ms{font-size:11px;color:var(--text3);margin-top:5px}
.bge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:6px;font-family:var(--mono)}
.bt{background:var(--teal-dim);color:var(--teal)}
.ba{background:var(--amber-dim);color:var(--amber)}
.br{background:var(--red-dim);color:var(--red)}
.bb{background:var(--blue-dim);color:var(--blue)}
.bg2{background:var(--green-dim);color:var(--green)}
.cw{position:relative;width:100%}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:11px;color:var(--text3);font-family:var(--mono)}
.li{display:flex;align-items:center;gap:5px}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.gr{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:.5px solid var(--border)}
.gr:last-child{border-bottom:none}
.grl{font-size:12px;color:var(--text2);min-width:110px;font-family:var(--mono)}
.gbw{flex:1}
.gbb{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.gbf{height:100%;border-radius:2px}
.gvs{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.wr{display:grid;grid-template-columns:70px 1fr;gap:10px;align-items:start;padding:12px 0;border-bottom:.5px solid var(--border)}
.wr:last-child{border-bottom:none}
.wda{font-family:var(--mono);font-size:11px;color:var(--text3);padding-top:2px}
.wn{font-weight:500;font-size:13px;margin-bottom:3px}
.wdt{color:var(--text2);font-size:11px;font-family:var(--mono)}
.ex-pill{display:inline-block;font-size:10px;padding:1px 7px;border-radius:12px;border:.5px solid var(--border2);color:var(--text3);font-family:var(--mono);margin:2px 2px 0 0}
.rr{display:flex;gap:12px;padding:12px 0;border-bottom:.5px solid var(--border)}
.rr:last-child{border-bottom:none}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.rt{font-size:13px;font-weight:500;margin-bottom:3px}
.rb{font-size:12px;color:var(--text2);line-height:1.5}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.mtl{background:var(--surface2);border:.5px solid var(--border);border-radius:var(--rs);padding:12px}
.mn{font-size:11px;font-family:var(--mono);margin-bottom:8px;color:var(--text2)}
.mbb{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.mbf{height:100%;border-radius:2px}
.mst{font-size:10px;color:var(--text3);margin-top:5px;font-family:var(--mono)}
.errbox{background:var(--red-dim);border:.5px solid var(--red);border-radius:var(--r);padding:1rem 1.25rem;font-family:var(--mono);font-size:12px;color:var(--red);margin-bottom:1.5rem;line-height:1.7}
.sp{display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);margin-left:8px}
hr{border:none;border-top:.5px solid var(--border);margin:1rem 0}
.upd{font-family:var(--mono);font-size:10px;color:var(--text3);text-align:right;margin-top:2rem}
.setup-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.setup-card{background:var(--surface);border:.5px solid var(--border2);border-radius:var(--r);padding:2.5rem;max-width:480px;width:100%}
.setup-title{font-family:var(--serif);font-size:26px;font-style:italic;margin-bottom:6px}
.setup-title span{color:var(--teal)}
.setup-sub{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:2rem;line-height:1.7}
.setup-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.setup-input{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s;margin-bottom:1rem}
.setup-input:focus{border-color:var(--teal)}
.setup-btn{width:100%;padding:11px;background:var(--teal);border:none;border-radius:var(--rs);color:#0e0e0c;font-family:var(--mono);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .2s}
.setup-btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="page">

  <!-- SETUP (first time only — enter GitHub token) -->
  <div id="setup" style="display:none">
    <div class="setup-wrap">
      <div class="setup-card">
        <div class="setup-title">Health <span>Centre</span></div>
        <div class="setup-sub">
          One-time setup. You need a GitHub personal access token so the dashboard can read your <code>data.json</code> file.<br><br>
          Get one at <strong>github.com/settings/tokens</strong> → Fine-grained → repo <code>somogyif/health</code> → Contents: Read-only.
        </div>
        <div class="setup-label">GitHub token</div>
        <input class="setup-input" id="ghToken" type="password" placeholder="github_pat_..." autocomplete="off" spellcheck="false">
        <button class="setup-btn" onclick="saveToken()">Save & load dashboard →</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="main" style="display:none">
    <div class="header">
      <div>
        <div class="title">Health <span>Centre</span></div>
        <div class="sub" id="sub">loading...</div>
      </div>
      <div class="hbtns">
        <button class="rbtn" style="font-size:11px;padding:6px 12px;color:var(--text3)" onclick="clearToken()">⚙ reset</button>
        <button class="rbtn" id="rbtn" onclick="load()">
          <div class="spin" id="spin"></div>
          <span id="rl">↻ refresh</span>
        </button>
      </div>
    </div>
    <div id="errbox" class="errbox" style="display:none"></div>
    <div id="dash"></div>
  </div>

</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const REPO  = 'somogyif/health';
const FILE  = 'data.json';

// ── TOKEN ─────────────────────────────────────────────────────────────────
const getToken   = () => localStorage.getItem('gh_token') || '';
const saveToken  = () => {
  const t = document.getElementById('ghToken').value.trim();
  if (!t) { alert('Please enter your GitHub token'); return; }
  localStorage.setItem('gh_token', t);
  showMain();
};
const clearToken = () => { localStorage.removeItem('gh_token'); location.reload(); };

// ── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (getToken()) showMain();
  else document.getElementById('setup').style.display = 'block';
});

function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display  = 'block';
  load();
}

// ── FETCH data.json from GitHub ───────────────────────────────────────────
async function fetchData() {
  const url = `https://api.github.com/repos/${REPO}/contents/${FILE}`;
  const res = await fetch(url, {
    headers: {
      'Authorization': 'Bearer ' + getToken(),
      'Accept': 'application/vnd.github.raw+json',
    },
    signal: AbortSignal.timeout(10000)
  });
  if (!res.ok) throw new Error(`GitHub returned ${res.status}`);
  return res.json();
}

// ── CHARTS ────────────────────────────────────────────────────────────────
let CHS = [];
function killCharts() { CHS.forEach(c => { try { c.destroy(); } catch(e) {} }); CHS = []; }
function mkChart(id, cfg) { const el = document.getElementById(id); if (!el) return; CHS.push(new Chart(el, cfg)); }

// ── RENDER ────────────────────────────────────────────────────────────────
function fmt(v, unit='') { return v != null ? `${v}${unit}` : '—'; }
const sc = s => (s||'').includes('Upper') ? 'var(--blue)' : 'var(--teal)';

function render(d) {
  killCharts();
  const g   = d.garmin || {};

  // Biological age calculations
  const bioAge     = g.fitness_age ? g.fitness_age.toFixed(1) : '25.8';
  const chronoAge  = g.chrono_age || 29;
  const achieveAge = g.achievable_age ? g.achievable_age.toFixed(1) : '21.1';
  const ageDiff    = (chronoAge - parseFloat(bioAge)).toFixed(1);
  const vigorousDays = g.vigorous_days != null ? g.vigorous_days.toFixed(1) : '0.1';
  const vigorousPct  = Math.min(100, Math.round((g.vigorous_days || 0.1) / (g.vigorous_target || 3) * 100));
  const rhr        = g.resting_hr || 64;
  const hrv        = g.hrv_weekly || 42;
  const bmi        = d.body_comp?.bmi || 23.1;

  // Age bar positioning (range 20-40 = 100%)
  const ageToPos = age => Math.max(0, Math.min(98, ((parseFloat(age) - 20) / 20) * 100));
  const currentPct = ageToPos(bioAge);
  const chronoPct  = ageToPos(chronoAge);
  const achievePct = ageToPos(achieveAge);
  const bc  = d.body_comp || {};
  const wks = d.workouts || [];
  const goals = d.goals || [];
  const recs  = d.recs  || [];
  const bbt   = d.bb_trend || { labels:[], wake:[], drain:[] };

  const syncedAt = d.synced_at ? new Date(d.synced_at).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
  const pill = `<span class="sp bt">auto-synced · ${syncedAt}</span>`;
  document.getElementById('sub').innerHTML = `data.json on github ${pill}`;

  const bbCurrent  = g.bb_current  ?? '—';
  const bbCharged  = g.bb_charged  ?? '—';
  const bbDrained  = g.bb_drained  ?? '—';
  const sleepOk    = g.sleep_hours >= 7.5;
  const sleepLabel = g.sleep_missing ? 'Missing' : `${g.sleep_hours}h`;
  const sleepClass = g.sleep_missing ? 'rd' : 'tl';
  const sleepBadge = g.sleep_missing ? '<span class="bge br">fix this first</span>' : '<span class="bge bt">great sleep</span>';
  const sleepSub   = g.sleep_missing ? 'watch not worn overnight' : 'watch worn to bed ✓';

  document.getElementById('dash').innerHTML = `
    <div class="sec"><div class="lbl">Today's snapshot — ${g.date || '—'}</div>
    <div class="g4">
      <div class="mt"><div class="ml">Body battery</div><div class="mv am">${bbCurrent}</div><div class="ms">charged ${bbCharged} · −${bbDrained} drained</div><span class="bge ba">check tonight</span></div>
      <div class="mt"><div class="ml">Resting HR</div><div class="mv">${fmt(g.resting_hr,' bpm')}</div><div class="ms">7-day avg: ${fmt(g.rhr_avg,' bpm')}</div><span class="bge ba">monitor</span></div>
      <div class="mt"><div class="ml">HRV status</div><div class="mv tl" style="font-size:20px;padding-top:3px">${g.hrv_status||'—'}</div><div class="ms">weekly avg: ${fmt(g.hrv_weekly,' ms')}</div><span class="bge bt">baseline 40–56 ms</span></div>
      <div class="mt"><div class="ml">Steps</div><div class="mv">${g.steps != null ? g.steps.toLocaleString() : '—'}</div><div class="ms">goal: 5,670</div>${g.steps >= 5670 ? '<span class="bge bt">✓ goal met</span>' : '<span class="bge ba">in progress</span>'}</div>
      <div class="mt"><div class="ml">Avg stress</div><div class="mv ${g.avg_stress > 50 ? 'am' : 'tl'}">${fmt(g.avg_stress)}</div><div class="ms">&nbsp;</div><span class="bge ${g.avg_stress > 50 ? 'ba' : 'bt'}">${g.avg_stress > 50 ? 'medium-high' : 'low — good'}</span></div>
      <div class="mt"><div class="ml">Active kcal</div><div class="mv">${fmt(g.active_kcal)}</div><div class="ms">total: ${fmt(g.total_kcal)} kcal</div><span class="bge bb">today's activity</span></div>
      <div class="mt"><div class="ml">Sleep</div><div class="mv ${sleepClass}" style="font-size:20px;padding-top:3px">${sleepLabel}</div><div class="ms">${sleepSub}</div>${sleepBadge}</div>
      <div class="mt"><div class="ml">HRV last night</div><div class="mv tl">${fmt(g.hrv_last_night,' ms')}</div><div class="ms">weekly avg: ${fmt(g.hrv_weekly,' ms')}</div><span class="bge bt">above baseline ✓</span></div>
    </div></div>


    <div class="sec" id="bio-age-tile"><div class="lbl">Biological age</div>
    <div class="g2">
      <div class="card">
        <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:1.25rem;flex-wrap:wrap">
          <div>
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:4px">garmin fitness age</div>
            <div style="font-size:52px;font-weight:300;letter-spacing:-3px;line-height:1;color:var(--teal)"><span id="bio-age-value">25.8</span><span style="font-size:18px;color:var(--text3);font-weight:300"> yrs</span></div>
            <div style="font-size:12px;color:var(--text2);margin-top:6px">chronological age: <span id="bio-chrono">29</span> · saving <span id="bio-age-diff" style="color:var(--teal)">3.2</span> years</div>
          </div>
          <div style="flex:1;min-width:160px">
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:6px">age range</div>
            <div style="position:relative;height:8px;background:var(--surface3);border-radius:4px;overflow:visible;margin-bottom:8px">
              <div style="position:absolute;left:0;top:0;height:100%;border-radius:4px;background:linear-gradient(90deg,#2dd4a0,#f5a623,#ff5f5f);width:100%"></div>
              <div id="bio-achieve-marker" style="position:absolute;top:-4px;height:16px;width:2px;background:#2dd4a0;border-radius:1px;left:5%"></div>
              <div id="bio-current-marker" style="position:absolute;top:-6px;height:20px;width:3px;background:white;border-radius:2px;box-shadow:0 0 6px rgba(255,255,255,0.5);left:29%"></div>
              <div id="bio-chrono-marker" style="position:absolute;top:-3px;height:14px;width:2px;background:var(--amber);border-radius:1px;left:45%"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:var(--mono)">
              <span>20</span><span>25</span><span>30</span><span>35</span><span>40</span>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11px;font-family:var(--mono)">
              <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:white;border-radius:50%;display:inline-block"></span>current <span id="bio-current-label">25.8</span></span>
              <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--amber);border-radius:50%;display:inline-block"></span>actual <span id="bio-chrono-label">29</span></span>
              <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;background:var(--teal);border-radius:50%;display:inline-block"></span>achievable <span id="bio-achieve">21.1</span></span>
            </div>
          </div>
        </div>
        <div id="bio-summary" style="font-size:12px;color:var(--text2);line-height:1.6">
          Your body is functioning <strong style="color:var(--teal)">3.2 years younger</strong> than your calendar age. With consistent training and sleep, you could reach <strong style="color:var(--teal)">21.1</strong>.
        </div>
      </div>
      <div class="card">
        <div class="lbl" style="margin-bottom:14px">What's driving your age</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">Resting HR</span><span id="bio-rhr" style="color:var(--teal);font-family:var(--mono)">64 bpm ✓</span></div>
            <div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden"><div style="width:80%;height:100%;background:#2dd4a0;border-radius:2px"></div></div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)">healthy range for age ✓</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">HRV</span><span id="bio-hrv" style="color:var(--teal);font-family:var(--mono)">42 ms ✓</span></div>
            <div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden"><div style="width:65%;height:100%;background:#2dd4a0;border-radius:2px"></div></div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)">balanced range ✓</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">Vigorous activity</span><span id="bio-vigorous" style="color:var(--amber);font-family:var(--mono)">0.1d/wk ⚠</span></div>
            <div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden"><div id="bio-vigorous-bar" style="width:3%;height:100%;background:#f5a623;border-radius:2px"></div></div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)">target 3 days/week → #1 improvement lever</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">BMI</span><span id="bio-bmi" style="color:var(--teal);font-family:var(--mono)">23.1 ✓</span></div>
            <div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden"><div style="width:72%;height:100%;background:#2dd4a0;border-radius:2px"></div></div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)">normal range · target 20.9 for optimal</div>
          </div>
          <div>
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--text2)">Body fat</span><span style="color:var(--amber);font-family:var(--mono)">21% ⚠</span></div>
            <div style="height:3px;background:var(--surface3);border-radius:2px;overflow:hidden"><div style="width:40%;height:100%;background:#f5a623;border-radius:2px"></div></div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)">target 16–17% → further age reduction possible</div>
          </div>
        </div>
      </div>
    </div></div>

    <div class="sec"><div class="lbl">Body composition — ${bc.date||'—'}</div>
    <div class="g2">
      <div class="card">
        <div class="g4" style="margin-bottom:1rem">
          <div class="mt"><div class="ml">Weight</div><div class="mv">${fmt(bc.weight,' kg')}</div></div>
          <div class="mt"><div class="ml">Body fat</div><div class="mv am">${fmt(bc.fat_pct,'%')}</div><span class="bge ba">target 16–17%</span></div>
          <div class="mt"><div class="ml">Lean mass</div><div class="mv tl">${fmt(bc.lean_kg,' kg')}</div><span class="bge bt">protect this</span></div>
          <div class="mt"><div class="ml">BMI</div><div class="mv">${fmt(bc.bmi)}</div><span class="bge bg2">normal</span></div>
        </div>
        <div class="cw" style="height:100px"><canvas id="cc" role="img" aria-label="Body composition"></canvas></div>
        <div class="leg" style="margin-top:8px">
          <div class="li"><div class="ld" style="background:#2dd4a0"></div>lean ${bc.lean_kg} kg (${bc.weight ? Math.round(bc.lean_kg/bc.weight*100) : '?'}%)</div>
          <div class="li"><div class="ld" style="background:#f5a623"></div>fat ${bc.weight && bc.lean_kg ? (bc.weight-bc.lean_kg).toFixed(1) : '?'} kg (${bc.fat_pct}%)</div>
        </div>
      </div>
      <div class="card">
        <div class="lbl" style="margin-bottom:14px">Goals progress</div>
        ${goals.map(g => `<div class="gr"><div class="grl">${g.label}</div><div class="gbw"><div class="gbb"><div class="gbf" style="width:${g.pct}%;background:${g.color}"></div></div><div class="gvs"><span>${g.current}</span><span>${g.target}</span></div></div></div>`).join('')}
      </div>
    </div></div>

    <div class="sec"><div class="lbl">Recovery — body battery trend</div>
    <div class="card">
      <div class="cw" style="height:190px"><canvas id="bc2" role="img" aria-label="Body battery trend"></canvas></div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:#2dd4a0"></div>wake-up battery</div>
        <div class="li"><div class="ld" style="background:#f5a623;border-radius:0;height:2px;width:14px"></div>points drained</div>
      </div>
    </div></div>

    <div class="sec"><div class="lbl">Recent workouts</div>
    <div class="card">
      ${wks.length === 0 ? '<div style="color:var(--text3);font-family:var(--mono);font-size:12px">No workouts found</div>' :
        wks.map(w => `
          <div class="wr">
            <div class="wda">${w.date}<br><span style="color:${sc(w.title)}">${(w.title||'').toLowerCase()}</span></div>
            <div>
              <div class="wn">${w.title||'—'} <span style="font-size:11px;color:var(--text3);font-weight:300">${w.duration||''}</span></div>
              <div style="margin-top:4px">${(w.exercises||[]).map(e => `<span class="ex-pill">${e.name} ${e.weight}kg×${e.reps}</span>`).join('')}</div>
            </div>
          </div>`).join('')}
    </div></div>

    <div class="sec"><div class="lbl">Active recommendations</div>
    <div class="card">
      ${recs.map(r => `
        <div class="rr">
          <div class="rdot" style="background:${r.level==='red'?'var(--red)':r.level==='amber'?'var(--amber)':'var(--teal)'}"></div>
          <div><div class="rt">${r.title}</div><div class="rb">${r.body}</div></div>
        </div>`).join('')}
    </div></div>

    <div class="sec"><div class="lbl">Muscle group coverage</div>
    <div class="mg">
      ${[
        {n:'Chest',p:85,s:'well covered'},{n:'Back',p:90,s:'excellent'},
        {n:'Shoulders',p:80,s:'rear delt added'},{n:'Biceps',p:80,s:'good'},
        {n:'Triceps',p:75,s:'just added ✨'},{n:'Quads',p:90,s:'excellent'},
        {n:'Hamstrings',p:85,s:'RDL + curl'},{n:'Abs',p:70,s:'leg raise added'},
        {n:'Calves',p:85,s:'two variations'}
      ].map(m=>`<div class="mtl"><div class="mn">${m.n}</div><div class="mbb"><div class="mbf" style="width:${m.p}%;background:${m.p>=85?'#2dd4a0':'#f5a623'}"></div></div><div class="mst">${m.s}</div></div>`).join('')}
    </div></div>

    <div class="upd">auto-synced daily · hevy pro · garmin fenix 7x · apple health</div>
  `;

  // Inject biological age values into the pre-rendered section
  const bioDiv = document.getElementById('bio-age-tile');
  if (bioDiv) {
    bioDiv.querySelector('#bio-age-value').textContent = bioAge;
    bioDiv.querySelector('#bio-age-diff').textContent = ageDiff;
    bioDiv.querySelector('#bio-achieve').textContent = achieveAge;
    bioDiv.querySelector('#bio-chrono').textContent = chronoAge;
    bioDiv.querySelector('#bio-rhr').textContent = rhr + ' bpm ✓';
    bioDiv.querySelector('#bio-hrv').textContent = hrv + ' ms ✓';
    bioDiv.querySelector('#bio-vigorous').textContent = vigorousDays + 'd/wk';
    bioDiv.querySelector('#bio-bmi').textContent = bmi;
    bioDiv.querySelector('#bio-current-marker').style.left = currentPct + '%';
    bioDiv.querySelector('#bio-chrono-marker').style.left = chronoPct + '%';
    bioDiv.querySelector('#bio-achieve-marker').style.left = achievePct + '%';
    bioDiv.querySelector('#bio-vigorous-bar').style.width = vigorousPct + '%';
    bioDiv.querySelector('#bio-summary').innerHTML = 
      'Your body is functioning <strong style="color:var(--teal)">' + ageDiff + ' years younger</strong> than your calendar age. With consistent training and sleep, you could reach <strong style="color:var(--teal)">' + achieveAge + '</strong>.';
    const currentLabel = bioDiv.querySelector('#bio-current-label');
    const chronoLabel  = bioDiv.querySelector('#bio-chrono-label');
    if (currentLabel) currentLabel.textContent = bioAge;
    if (chronoLabel)  chronoLabel.textContent  = chronoAge;
  }

  // Charts
  const gc = 'rgba(255,255,255,0.06)', tc = '#5a5852';

  if (bc.weight && bc.lean_kg) {
    mkChart('cc', {
      type:'bar', data:{labels:[''],datasets:[
        {label:`Lean ${bc.lean_kg} kg`,data:[bc.lean_kg],backgroundColor:'#2dd4a0',borderWidth:0,borderRadius:4,borderSkipped:false},
        {label:`Fat ${(bc.weight-bc.lean_kg).toFixed(1)} kg`,data:[bc.weight-bc.lean_kg],backgroundColor:'#f5a623',borderWidth:0,borderRadius:4,borderSkipped:false}
      ]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label}}},
        scales:{x:{stacked:true,max:90,ticks:{callback:v=>v+' kg',color:tc,font:{size:10}},grid:{color:gc}},y:{stacked:true,display:false}}
      }
    });
  }

  if (bbt.labels.length) {
    mkChart('bc2', {
      type:'line', data:{labels:bbt.labels,datasets:[
        {label:'Wake-up battery',data:bbt.wake,borderColor:'#2dd4a0',backgroundColor:'rgba(45,212,160,0.06)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#2dd4a0',tension:0.3,fill:true},
        {label:'Points drained',data:bbt.drain,borderColor:'#f5a623',backgroundColor:'transparent',borderWidth:1.5,pointRadius:2,pointBackgroundColor:'#f5a623',tension:0.3,borderDash:[4,3]}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+Math.round(c.parsed.y)}}},
        scales:{
          x:{ticks:{color:tc,font:{size:10,family:'DM Mono'},maxRotation:45,autoSkip:true,maxTicksLimit:12},grid:{color:gc}},
          y:{min:0,max:105,ticks:{color:tc,font:{size:10}},grid:{color:gc}}
        }
      }
    });
  }
}

// ── MAIN LOAD ─────────────────────────────────────────────────────────────
async function load() {
  const btn=document.getElementById('rbtn'), sp=document.getElementById('spin'), rl=document.getElementById('rl'), eb=document.getElementById('errbox');
  btn.disabled=true; sp.style.display='block'; rl.textContent='fetching...'; eb.style.display='none';
  document.getElementById('sub').textContent = 'fetching from github...';

  try {
    const data = await fetchData();
    render(data);
  } catch(e) {
    eb.innerHTML = `<strong>Could not load data.json from GitHub</strong><br><span style="opacity:.7">${e.message}</span><br><br>Make sure the sync script has run at least once and <code>data.json</code> exists in your repo.`;
    eb.style.display='block';
    document.getElementById('sub').textContent = 'could not load data';
  }

  btn.disabled=false; sp.style.display='none'; rl.textContent='↻ refresh';
}
</script>
</body>
</html>
